name: lib-input-mapping
on:
  workflow_call: {}

concurrency:
  group: input-mapping-lock
  cancel-in-progress: false

jobs:
  cs:
    name: Code style & static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-input-mapping
      - name: Run checks
        run: docker compose run --rm dev-input-mapping bash -c 'composer install && composer check'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  aws-common-part1:
    name: AWS · Common part 1
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-input-mapping
      - name: Run tests
        run: docker compose run --rm dev-input-mapping bash -c 'composer install && composer paratest -- --testsuite=CommonPart1 -f -p 3'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  aws-testsuite:
    name: AWS · AWS suite
    needs: [cs, aws-common-part1]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-input-mapping
      - name: Run tests
        run: docker compose run --rm dev-input-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite Aws'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  aws-common-part2:
    name: AWS · Common part 2
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-input-mapping
      - name: Run tests
        run: docker compose run --rm dev-input-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite CommonPart2'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  aws-common-files:
    name: AWS · Common files
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
