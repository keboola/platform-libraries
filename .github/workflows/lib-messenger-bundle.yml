name: lib-messenger-bundle
on:
  workflow_call: {}

jobs:
  aws:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.MESSENGER_BUNDLE_TERRAFORM_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MESSENGER_BUNDLE_TERRAFORM_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build dev-messenger-bundle
      - run: ./libs/messenger-bundle/provisioning/ci/pipelines-scripts/terraform-install.sh
      - run: ./libs/messenger-bundle/provisioning/ci/pipelines-scripts/terraform-init.sh
      - run: ./libs/messenger-bundle/provisioning/ci/update-env.sh -v -e .env -a aws
      - run: docker compose run --rm dev-messenger-bundle bash -c 'composer install && composer ci'
      - if: failure()
        run: docker compose logs

  azure:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.MESSENGER_BUNDLE_TERRAFORM_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MESSENGER_BUNDLE_TERRAFORM_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build dev-messenger-bundle
      - run: ./libs/messenger-bundle/provisioning/ci/pipelines-scripts/terraform-install.sh
      - run: ./libs/messenger-bundle/provisioning/ci/pipelines-scripts/terraform-init.sh
      - run: ./libs/messenger-bundle/provisioning/ci/update-env.sh -v -e .env -a azure
      - run: docker compose run --rm dev-messenger-bundle bash -c 'composer install && composer ci'
      - if: failure()
        run: docker compose logs

  gcp:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.MESSENGER_BUNDLE_TERRAFORM_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.MESSENGER_BUNDLE_TERRAFORM_AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build dev-messenger-bundle
      - run: ./libs/messenger-bundle/provisioning/ci/pipelines-scripts/terraform-install.sh
      - run: ./libs/messenger-bundle/provisioning/ci/pipelines-scripts/terraform-init.sh
      - run: ./libs/messenger-bundle/provisioning/ci/update-env.sh -v -e .env -a gcp
      - run: docker compose run --rm dev-messenger-bundle bash -c 'composer install && composer ci'
      - if: failure()
        run: docker compose logs
