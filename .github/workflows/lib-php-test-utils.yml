name: lib-php-test-utils
on:
  workflow_call: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-php-test-utils
      - name: Run tests
        env:
          HOSTNAME_SUFFIX: ${{ secrets.HOSTNAME_SUFFIX_GCP }}
          TEST_STORAGE_API_TOKEN_SNOWFLAKE: ${{ secrets.PHP_TEST_UTILS__TEST_STORAGE_API_TOKEN_SNOWFLAKE }}
        run: docker compose run --rm dev-php-test-utils bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
