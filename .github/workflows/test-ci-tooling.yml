name: test-ci-tooling

on:
  push:
    paths:
      - 'ci/**'
      - 'tests/ci/**'
      - '.github/workflows/test-ci-tooling.yml'

jobs:
  bats:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update -q && sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/ci/
