name: lib-staging-provider
on:
  workflow_call: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-staging-provider
      - name: Run tests
        env:
          STORAGE_API_URL: ${{ secrets.STORAGE_API_URL_AWS }}
          STORAGE_API_TOKEN: ${{ secrets.STAGING_PROVIDER__STORAGE_API_TOKEN_AWS }}
        run: docker compose run --rm dev-staging-provider bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
