name: lib-logging-bundle
on:
  workflow_call: {}

concurrency:
  group: logging-bundle-lock
  cancel-in-progress: false

jobs:
  symfony-64:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SYMFONY_REQUIRE: "6.4.*"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev81
      - name: Run tests
        run: docker compose run --rm -e SYMFONY_REQUIRE dev81 bash -c 'cd libs/logging-bundle && composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  symfony-72:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SYMFONY_REQUIRE: "7.2.*"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev83
      - name: Run tests
        run: docker compose run --rm -e SYMFONY_REQUIRE dev83 bash -c 'cd libs/logging-bundle && composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
