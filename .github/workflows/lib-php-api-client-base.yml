name: lib-php-api-client-base
on:
  workflow_call: {}

concurrency:
  group: php-api-client-base-lock
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-php-api-client-base
      - name: Run tests
        run: docker compose run --rm dev-php-api-client-base bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
