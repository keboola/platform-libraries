name: lib-permission-checker
on:
  workflow_call: {}

concurrency:
  group: permission-checker-lock
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-permission-checker
      - name: Run tests
        run: docker compose run --rm dev-permission-checker bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
