name: Release
on:
  push:
    tags: ['*/*']

permissions:
  contents: read

jobs:
  release-api-bundle:
    if: startsWith(github.ref, 'refs/tags/api-bundle/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/split-library
        with:
          source-path: ${{ github.workspace }}
          library-path: libs/api-bundle
          target-repo: api-bundle
          tag-prefix: api-bundle/
          app-id: ${{ vars.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}

  release-azure-api-client:
