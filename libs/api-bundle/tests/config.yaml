parameters:
    app_name: api-bundle-test

framework:
    test: true
    secret: test
    http_method_override: false

monolog:
    handlers:
        main:
            type: stream
            path: php://stdout
            level: debug

services:
    # This minimal kernel has no SecurityBundle, so TokenStorageInterface would be missing and the
    # tagged StorageClientApiFactoryResolver could not compile. Provide a plain TokenStorage (public so a
    # test can seed a token). Real apps get this from SecurityBundle.
    Symfony\Component\Security\Core\Authentication\Token\Storage\TokenStorageInterface:
        class: Symfony\Component\Security\Core\Authentication\Token\Storage\TokenStorage
        public: true
