    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AZURE }}
      STORAGE_API_TOKEN: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_AZURE }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AZURE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-input-mapping
      - name: Run tests
        run: docker compose run --rm dev-input-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite CommonPart2'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  azure-common-files:
    name: Azure · Common files
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AZURE }}
      STORAGE_API_TOKEN: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_AZURE }}
