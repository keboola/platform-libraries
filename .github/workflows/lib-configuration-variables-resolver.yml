name: lib-configuration-variables-resolver
on:
  workflow_call: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-configuration-variables-resolver
      - name: Run tests
        env:
          STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
          STORAGE_API_TOKEN: ${{ secrets.VARIABLES_RESOLVER__STORAGE_API_TOKEN }}
          STORAGE_API_TOKEN_MASTER: ${{ secrets.VARIABLES_RESOLVER__STORAGE_API_TOKEN_MASTER }}
        run: docker compose run --rm dev-configuration-variables-resolver bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
