      - name: Run tests
        run: docker compose run --rm dev-input-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite Azure'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  azure-common-part2:
    name: Azure · Common part 2
