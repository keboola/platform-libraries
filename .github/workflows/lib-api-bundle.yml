name: lib-api-bundle
on:
  workflow_call: {}

concurrency:
  group: api-bundle-lock
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-api-bundle
      - name: Run tests
        run: docker compose run --rm dev-api-bundle bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
