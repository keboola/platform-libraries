      STORAGE_API_TOKEN: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_AZURE }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.INPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AZURE }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build dev-input-mapping
      - run: docker compose run --rm dev-input-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite Azure'
      - if: failure()
        run: docker compose logs

  azure-common-part2:
