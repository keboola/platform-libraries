name: lib-query-service-api-client
on:
  workflow_call: {}

concurrency:
  group: query-service-api-client-lock
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build dev-query-service-api-client
      - name: Run tests
        env:
          STORAGE_API_URL: ${{ vars.STORAGE_API_URL_GCP }}
          STORAGE_API_TOKEN: ${{ secrets.QUERY_SERVICE__STORAGE_API_TOKEN_GCP }}
          HOSTNAME_SUFFIX: ${{ vars.HOSTNAME_SUFFIX_GCP }}
        run: docker compose run --rm dev-query-service-api-client bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
