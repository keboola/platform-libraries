name: lib-php-storage-names-sanitizer
on:
  workflow_call: {}

concurrency:
  group: php-storage-names-sanitizer-lock
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-php-storage-names-sanitizer
      - name: Run tests
        env:
          STORAGE_API_URL: ${{ vars.STORAGE_API_URL_GCP }}
          STORAGE_API_TOKEN: ${{ secrets.QUERY_SERVICE__STORAGE_API_TOKEN_GCP }}
        run: docker compose run --rm dev-php-storage-names-sanitizer bash -c 'composer install && composer ci'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
