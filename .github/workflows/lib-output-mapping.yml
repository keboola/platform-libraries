name: lib-output-mapping
on:
  workflow_call: {}

concurrency:
  group: output-mapping-lock
  cancel-in-progress: false

jobs:
  cs:
    name: Code style & static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run checks
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && composer check'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  general:
    name: General tests
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
      BIGQUERY_STORAGE_API_URL: ${{ vars.OUTPUT_MAPPING__BIGQUERY_STORAGE_API_URL }}
      BIGQUERY_STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING__BIGQUERY_STORAGE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run tests
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && composer paratests -- --testsuite general-tests -f -p 4'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  main-writer-1:
    name: Main writer tests (1/2)
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run tests
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && composer paratests -- --testsuite main-writer-tests-1 -f'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  main-writer-2:
    name: Main writer tests (2/2)
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run tests
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite main-writer-tests-2'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  workspace-writer:
    name: Workspace writer tests
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run tests
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && composer paratests -- --testsuite workspace-writer-tests -f'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  native-types:
    name: Native types
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING_NATIVE_TYPES__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run tests
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite native-types'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  new-native-types:
    name: New native types
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING_NEW_NATIVE_TYPES__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.OUTPUT_MAPPING__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run tests
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && vendor/bin/phpunit --testsuite new-native-types'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  slice:
    name: Slice feature
    needs: [cs]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      STORAGE_API_URL: ${{ vars.STORAGE_API_URL_AWS }}
      STORAGE_API_TOKEN: ${{ secrets.OUTPUT_MAPPING_SLICE_FEATURE__STORAGE_API_TOKEN_AWS }}
      STORAGE_API_TOKEN_MASTER: ${{ secrets.OUTPUT_MAPPING_SLICE_FEATURE__STORAGE_API_TOKEN_MASTER_AWS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker compose build dev-output-mapping
      - name: Run tests
        run: docker compose run --rm dev-output-mapping bash -c 'composer install && composer paratests -- --testsuite slice -f -p 4'
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
